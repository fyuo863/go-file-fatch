name: Multi-thread Downloader CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'  # 当推送 v 开头的标签时触发 (如 v0.0.4)
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 1. 代码检查 (任何推送都运行)
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          only-new-issues: true

  # 2. 单元测试 (任何推送都运行)
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Run tests
        run: go test -race -v ./...

  # 3. 跨平台构建 (仅在 main 分支推送或推送标签时运行)
  build:
    name: Build Binaries
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [ linux, darwin, windows ]
        goarch: [ amd64, arm64 ]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
      - name: Build binary
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          mkdir -p output
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o output/downloader-${{ matrix.goos }}-${{ matrix.goarch }}$EXT .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloader-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/

  # 4. 发布 Release (【关键】仅在推送 v* 标签时运行)
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-artifacts/**/*"
          # 使用你手动打的标签名 (例如 v0.0.4)
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            手动发布的正式版本。
            - 构建自 commit `${{ github.sha }}`
            - 平台：Windows, Linux, MacOS (Intel/M-series)
          token: ${{ secrets.GITHUB_TOKEN }}

      # 5. 钉钉通知 (仅在 Release 成功后发送)
      - name: Send DingTalk Notification
        uses: northwang-lucky/chatbot-webhook-client@v1.1.1
        with:
          app: DingTalk
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          secret: ${{ secrets.DINGTALK_SECRET }}
          template: >-
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "项目发布成功",
                "text": "### 🚀 项目 [${{ github.event.repository.name }}] 手动发布成功\n\n**版本号**: ${{ github.ref_name }}\n\n**构建状态**: 已完成所有平台编译 ✅\n\n[点击查看版本详情与下载](${{ github.event.repository.html_url }}/releases/tag/${{ github.ref_name }})"
              }
            }