# GitHub Actions 工作流配置文件
# 此文件定义了一个持续集成（CI）流程，用于检查代码质量和运行单元测试

name: Multi-thread Downloader CI  # 工作流名称

on:
  push:
    branches: [ main ]  # 当代码推送到 main 分支时触发
  pull_request:
    branches: [ main ]  # 当有针对 main 分支的 Pull Request 时触发
  workflow_dispatch:   # 允许手动触发工作流

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true  # 如果有新的工作流实例启动，取消正在运行的实例

jobs:
  # ----- 代码质量检查 -----
  lint:
    name: Lint & Vet  # 任务名称：代码质量检查
    runs-on: ubuntu-latest  # 指定运行环境为最新的 Ubuntu
    steps:
      - uses: actions/checkout@v4  # 检出代码仓库

      - name: Set up Go
        uses: actions/setup-go@v5  # 设置 Go 环境
        with:
          go-version: '1.26.2'  # 指定 Go 版本为 1.26.2
          cache: true  # 启用缓存以加速依赖安装

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9  # 使用 golangci-lint 进行代码检查
        with:
          version: latest  # 使用最新版本的 golangci-lint
          only-new-issues: true  # 仅报告新增问题

  # ----- 单元测试（需要先为项目补充测试文件）-----
  test:
    name: Test  # 任务名称：单元测试
    needs: lint  # 此任务依赖于 lint 任务，只有 lint 成功后才会运行
    runs-on: ubuntu-latest  # 指定运行环境为最新的 Ubuntu
    steps:
      - uses: actions/checkout@v4  # 检出代码仓库

      - name: Set up Go
        uses: actions/setup-go@v5  # 设置 Go 环境
        with:
          go-version: '1.26.2'  # 指定 Go 版本为 1.26.2
          cache: true  # 启用缓存以加速依赖安装

      - name: Run tests
        run: go test -race -v ./...  # 运行所有测试文件，启用竞态检测并输出详细日志

  # ----- 跨平台构建（main 分支推送时）-----
  build:
    name: Build Release Binaries
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [ linux, darwin, windows ]
        goarch: [ amd64, arm64 ]
        exclude:
          # 排除 darwin/arm64 以外的非主流组合（按需调整）
          - goos: darwin
            goarch: arm64  # 保留
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p output
          go build -o output/downloader-${{ matrix.goos }}-${{ matrix.goarch }}$EXT .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloader-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/

# ----- 自动发布到 GitHub Release -----
  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须：允许创建 Tag 和 Release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须：获取所有历史记录和标签，否则无法计算下一个版本号

      # 1. 自动计算并创建 Git Tag
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch  # 默认每次成功后最后一位 +1 (1.0.x)
          # 如果你在 commit message 里写了 "feat: ..."，它会自动变 1.1.0 (minor)
          # 如果写了 "fix: ..."，它会变 1.0.x (patch)

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      # 2. 使用上面生成的新 Tag 创建 Release
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-artifacts/**/*"
          # 注意：这里改用 tag_version 输出的标签
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: |
            自动构建的多平台下载器。
            
            - 本次更新内容：${{ steps.tag_version.outputs.changelog }}
            - 构建自 commit `${{ github.sha }}`
          token: ${{ secrets.GITHUB_TOKEN }}
      # 钉钉通知步骤
      - name: Send DingTalk Notification
        uses: northwang-lucky/chatbot-webhook-client@v1.1.1 # 建议指定版本号
        with:
          # 必须指定为 DingTalk
          app: DingTalk
          # 从 GitHub Secrets 中读取 Webhook
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          # 从 GitHub Secrets 中读取加签密钥
          secret: ${{ secrets.DINGTALK_SECRET }}
          # 这里的 template 必须是一个标准的 JSON 字符串
          # 我们使用 Markdown 格式让通知更美观
          template: >-
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "项目发布成功",
                "text": "### 🚀 项目发布成功\n\n**版本号**: ${{ steps.tag_version.outputs.new_tag }}\n\n**构建状态**: Success ✅\n\n**更新说明**: \n\n ${{ steps.tag_version.outputs.changelog }}\n\n [查看 Release 详情](${{ github.event.repository.html_url }}/releases/tag/${{ steps.tag_version.outputs.new_tag }})"
              }
            }